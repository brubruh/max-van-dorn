<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - Maxim Van Dorn</title>
    <link href="styles.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="images/logo.png">
    <meta name="description" content="Explore Maxim Van Dorn's portfolio of creative web development and software projects">
</head>
<body>
    <!-- Video Background -->
    <div class="video-background">
        <video autoplay muted loop playsinline>
            <source src="images/explore.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
    
    <!-- Video Overlay -->
    <div class="video-overlay"></div>
    
    <!-- Color Mask -->
    <div class="color-mask"></div>

    <div class="page">
        <!-- Navigation -->
        <nav class="main-nav">
            <div class="nav-brand">
                <h1 class="logo">Maxim Van Dorn</h1>
                <span class="tagline">Creative Developer</span>
            </div>
            <button class="nav-toggle" aria-label="Toggle navigation menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>

        <!-- Side Menu -->
        <div class="side-menu" id="sideMenu">
            <div class="menu-content">
                <div class="menu-nav">
                    <a href="index.html" class="menu-link">Home</a>
                    <a href="about.html" class="menu-link">About</a>
                    <a href="projects.html" class="menu-link active">Projects</a>
                    <a href="resume.html" class="menu-link">Resume</a>
                </div>
            </div>
        </div>

        <!-- Projects Content -->
        <main class="content-section">
            <div class="container">
                <h1 class="section-title">My Projects</h1>
                
                <div class="section-content">
                    <p class="text-center">
                        A collection of creative projects that showcase my passion for combining 
                        technical excellence with ethical design principles.
                    </p>
                </div>

                <!-- Projects Grid -->
                <div class="projects-grid" id="projectsGrid">
                    <!-- Projects will be loaded dynamically -->
                </div>
            </div>
        </main>

        <!-- Control Panel Toggle -->
        <div class="control-toggle" id="controlToggle" title="Toggle Controls">
            ⚙️
        </div>

        <!-- Control Panel -->
        <div class="control-panel" id="controlPanel">
            <div class="control-group">
                <label class="control-label">Video Filters</label>
                <div class="control-buttons">
                    <button class="control-btn active" data-filter="none">None</button>
                    <button class="control-btn" data-filter="invert">Invert</button>
                    <button class="control-btn" data-filter="grayscale">Greyscale</button>
                    <button class="control-btn" data-filter="sepia">Sepia</button>
                    <button class="control-btn" data-filter="contrast">Contrast</button>
                    <button class="control-btn" data-filter="brightness">Brightness</button>
                </div>
            </div>
            <div class="control-group">
                <label class="control-label">Background Blur</label>
                <div class="control-buttons">
                    <button class="control-btn blur-btn" data-blur="off">Off</button>
                    <button class="control-btn blur-btn" data-blur="on">On</button>
                </div>
            </div>
            <div class="control-group">
                <label class="control-label">Mask Color</label>
                <input type="color" class="color-picker" id="colorPicker" value="#ffffff">
            </div>
        </div>
    </div>

    <script>
        // Navigation functionality
        const navToggle = document.querySelector('.nav-toggle');
        const sideMenu = document.querySelector('.side-menu');

        navToggle.addEventListener('click', () => {
            navToggle.classList.toggle('active');
            sideMenu.classList.toggle('active');
        });

        // Control panel toggle functionality
        const controlToggle = document.getElementById('controlToggle');
        const controlPanel = document.getElementById('controlPanel');

        controlToggle.addEventListener('click', () => {
            controlPanel.classList.toggle('active');
        });

        // Settings persistence
        const VideoSettings = {
            load() {
                return {
                    filter: localStorage.getItem('videoFilter') || 'none',
                    blur: localStorage.getItem('videoBlur') || 'off',
                    maskColor: localStorage.getItem('maskColor') || '#ffffff'
                };
            },
            
            save(settings) {
                localStorage.setItem('videoFilter', settings.filter);
                localStorage.setItem('videoBlur', settings.blur);
                localStorage.setItem('maskColor', settings.maskColor);
            }
        };

        // Filter functionality
        const filterButtons = document.querySelectorAll('[data-filter]');
        const blurButtons = document.querySelectorAll('[data-blur]');
        const videoBackground = document.querySelector('.video-background');
        const colorPicker = document.getElementById('colorPicker');
        const colorMask = document.querySelector('.color-mask');

        // Load saved settings
        const savedSettings = VideoSettings.load();

        // Apply video filter (preserve blur)
        function applyVideoFilter(filter) {
            // Remove all filter classes EXCEPT blur
            videoBackground.classList.remove('filter-invert', 'filter-grayscale', 'filter-sepia', 'filter-contrast', 'filter-brightness');
            if (filter !== 'none') {
                videoBackground.classList.add(`filter-${filter}`);
            }
        }

        // Apply blur filter
        function applyBlurFilter(blur) {
            if (blur === 'on') {
                videoBackground.classList.add('filter-blur');
            } else {
                videoBackground.classList.remove('filter-blur');
            }
        }

        // Apply mask color
        function applyMaskColor(color) {
            const r = parseInt(color.substr(1, 2), 16);
            const g = parseInt(color.substr(3, 2), 16);
            const b = parseInt(color.substr(5, 2), 16);
            colorMask.style.background = `rgba(${r}, ${g}, ${b}, 0.1)`;
        }

        // Video filter buttons
        filterButtons.forEach(button => {
            button.addEventListener('click', () => {
                filterButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                
                const filter = button.dataset.filter;
                applyVideoFilter(filter);
                
                const currentSettings = VideoSettings.load();
                currentSettings.filter = filter;
                VideoSettings.save(currentSettings);
            });
        });

        // Blur buttons
        blurButtons.forEach(button => {
            button.addEventListener('click', () => {
                blurButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                
                const blur = button.dataset.blur;
                applyBlurFilter(blur);
                
                const currentSettings = VideoSettings.load();
                currentSettings.blur = blur;
                VideoSettings.save(currentSettings);
            });
        });

        // Color picker functionality
        colorPicker.addEventListener('input', (e) => {
            const color = e.target.value;
            applyMaskColor(color);
            
            const currentSettings = VideoSettings.load();
            currentSettings.maskColor = color;
            VideoSettings.save(currentSettings);
        });

        // Initialize settings on page load
        function initializeSettings() {
            applyVideoFilter(savedSettings.filter);
            filterButtons.forEach(btn => {
                if (btn.dataset.filter === savedSettings.filter) {
                    btn.classList.add('active');
                }
            });

            applyBlurFilter(savedSettings.blur);
            blurButtons.forEach(btn => {
                if (btn.dataset.blur === savedSettings.blur) {
                    btn.classList.add('active');
                }
            });

            colorPicker.value = savedSettings.maskColor;
            applyMaskColor(savedSettings.maskColor);
        }

        // Initialize on page load
        initializeSettings();

        // Close menus when clicking outside
        document.addEventListener('click', (e) => {
            if (!sideMenu.contains(e.target) && !navToggle.contains(e.target)) {
                navToggle.classList.remove('active');
                sideMenu.classList.remove('active');
            }
            if (!controlPanel.contains(e.target) && !controlToggle.contains(e.target)) {
                controlPanel.classList.remove('active');
            }
        });

        // Load projects dynamically
        async function loadProjects() {
            try {
                const response = await fetch('data/projects.json');
                const data = await response.json();
                renderProjects(data.projects);
            } catch (error) {
                console.error('Error loading projects:', error);
                document.getElementById('projectsGrid').innerHTML = `
                    <div class="section-content">
                        <h3>Projects Coming Soon</h3>
                        <p>I'm currently updating my portfolio. Check back soon for exciting projects!</p>
                    </div>
                `;
            }
        }

        function renderProjects(projects) {
            const projectsGrid = document.getElementById('projectsGrid');
            
            if (!projects || projects.length === 0) {
                projectsGrid.innerHTML = `
                    <div class="section-content">
                        <h3>Projects Coming Soon</h3>
                        <p>I'm currently working on some exciting projects. Check back soon!</p>
                    </div>
                `;
                return;
            }

            projectsGrid.innerHTML = projects.map(project => `
                <div class="project-card fade-in">
                    ${project.image ? `
                        <div class="project-image">
                            <img src="${project.image}" alt="${project.title}" onerror="this.parentElement.style.display='none'">
                        </div>
                    ` : ''}
                    <div class="project-content">
                        <div class="project-header">
                            <h3 class="project-title">${project.title}</h3>
                            <span class="project-status ${project.status ? project.status.toLowerCase().replace(' ', '-') : 'unknown'}">${project.status || 'Unknown'}</span>
                        </div>
                        <p class="project-description">${project.description}</p>
                        ${project.technologies ? `
                            <div class="project-tech">
                                ${project.technologies.map(tech => `<span class="tech-tag">${tech}</span>`).join('')}
                            </div>
                        ` : ''}
                        <div class="project-actions">
                            ${project.link && project.link !== '#' ? 
                                `<a href="${project.link}" class="project-link" target="_blank" rel="noopener noreferrer">View Project</a>` :
                                `<span class="project-link disabled">Coming Soon</span>`
                            }
                        </div>
                    </div>
                </div>
            `).join('');

            // Add intersection observer for animations
            const cards = document.querySelectorAll('.project-card');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            });

            cards.forEach(card => observer.observe(card));
        }

        // Load projects when page loads
        document.addEventListener('DOMContentLoaded', loadProjects);
    </script>
</body>
</html>
